<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성경 뷰어</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main-container">
    <div class="sidebar" id="sidebar">
        </div>
    <div class="content-area">
        <div class="search-area">
            <input type="text" id="search-input" placeholder="단어 검색 또는 구절 검색 (예: 창 1:1, Gen1.1, 1 cor 13:1, 하나님)">
            <button class="button" id="search-button">검색</button>
            <button class="button" id="copy-kr-button">복사(한글)</button>
            <button class="button hidden" id="copy-en-button">복사(영어)</button> </div>
        
        <div class="controls-container">
            <button class="button" id="lang-toggle-button">한글 모드</button>
            
            <select id="format-dropdown" class="dropdown">
                <option value="standard">기본 모드</option>
                <option value="abbr">약식 모드</option>
                <option value="sequence">연속 모드</option>
                <option value="quote">인용 모드</option>
                <option value="short-quote">인용 약식 모드</option>
                <option value="double-quote">겹낫표 인용 모드</option>
                <option value="double-short-quote">겹낫표 약식 모드</option>
            </select>

            <button class="button" id="case-toggle-button">대소문자 구분 안함</button>

            <div class="navigation-buttons hidden" id="navigation-buttons">
                <button class="button" id="prev-chapter">이전 장</button>
                <button class="button" id="next-chapter">다음 장</button>
            </div>
        </div>
        
        <div class="output-container" id="output-wrapper">
            <div id="output-kr" class="output-pane font-malgun"></div>
            <div id="output-en" class="output-pane font-malgun hidden"></div>
        </div>
    </div>
</div>

<div id="toast-notification" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
